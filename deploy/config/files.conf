#!/usr/bin/env bash
###############################################################################
#
# TinQa Deployment Framework
#
# File        : files.conf
# Version     : 1.0.0
#
# Description :
# Centralized filesystem paths and deployment locations.
#
###############################################################################

set -Eeuo pipefail

###############################################################################
# Project
###############################################################################

PROJECT_DIRECTORY_NAME="TinQa_Weather_Sync_System"

###############################################################################
# Users
###############################################################################

PROJECT_USER="pi"

PROJECT_GROUP="pi"

HOME_DIRECTORY="/home/${PROJECT_USER}"

###############################################################################
# Project Directories
###############################################################################

PROJECT_DEPLOY_ROOT="${PROJECT_ROOT}"

###############################################################################
# Python
###############################################################################

VENV_DIRECTORY="${PROJECT_ROOT}/venv"

REQUIREMENTS_FILE="${PROJECT_ROOT}/requirements.txt"

###############################################################################
# Log Directories
###############################################################################

DEPLOYMENT_LOG_DIRECTORY="${LOG_DIRECTORY}/deployment"

APPLICATION_LOG_DIRECTORY="${LOG_DIRECTORY}/application"

DIAGNOSTIC_LOG_DIRECTORY="${LOG_DIRECTORY}/diagnostics"

###############################################################################
# Temporary Directories
###############################################################################

TEMP_DIRECTORY="${PROJECT_ROOT}/temp"

DOWNLOAD_DIRECTORY="${TEMP_DIRECTORY}/downloads"

EXTRACT_DIRECTORY="${TEMP_DIRECTORY}/extract"

###############################################################################
# Backup Directories
###############################################################################

BACKUP_DIRECTORY="${PROJECT_ROOT}/backup"

ROLLBACK_DIRECTORY="${BACKUP_DIRECTORY}/rollback"

SERVICE_BACKUP_DIRECTORY="${BACKUP_DIRECTORY}/systemd"

###############################################################################
# System Paths
###############################################################################

SYSTEMD_SERVICE_FILE="${SYSTEMD_DIRECTORY}/tinqa.service"

NMCLI_SUDOERS_FILE="${SUDOERS_DIRECTORY}/tinqa_nmcli"

###############################################################################
# Bluetooth
###############################################################################

BLUETOOTH_CACHE_DIRECTORY="${BLUETOOTH_DIRECTORY}/*/cache"

###############################################################################
# Runtime Files
###############################################################################

PID_FILE="${PROJECT_ROOT}/tinqa.pid"

LOCK_FILE="${PROJECT_ROOT}/deploy.lock"

STATUS_FILE="${PROJECT_ROOT}/deploy.status"

###############################################################################
# Cleanup Targets
###############################################################################

CLEANUP_DIRECTORIES=(

    "${VENV_DIRECTORY}"

    "${TEMP_DIRECTORY}"

)

CLEANUP_FILES=(

    "${LOCK_FILE}"

    "${STATUS_FILE}"

)

###############################################################################
# Required Directories
###############################################################################

REQUIRED_DIRECTORIES=(

    "${PROJECT_ROOT}"

    "${LOG_DIRECTORY}"

    "${DEPLOYMENT_LOG_DIRECTORY}"

    "${APPLICATION_LOG_DIRECTORY}"

    "${DIAGNOSTIC_LOG_DIRECTORY}"

    "${TEMP_DIRECTORY}"

    "${DOWNLOAD_DIRECTORY}"

    "${EXTRACT_DIRECTORY}"

    "${BACKUP_DIRECTORY}"

    "${ROLLBACK_DIRECTORY}"

    "${DIAGNOSTIC_LOG_DIRECTORY}/report"

)

###############################################################################
# Export
###############################################################################

export PROJECT_DIRECTORY_NAME

export HOME_DIRECTORY

export PROJECT_ROOT
export PROJECT_DEPLOY_ROOT

export VENV_DIRECTORY
export REQUIREMENTS_FILE

export LOG_DIRECTORY
export DEPLOYMENT_LOG_DIRECTORY
export APPLICATION_LOG_DIRECTORY
export DIAGNOSTIC_LOG_DIRECTORY

export TEMP_DIRECTORY
export DOWNLOAD_DIRECTORY
export EXTRACT_DIRECTORY

export BACKUP_DIRECTORY
export ROLLBACK_DIRECTORY
export SERVICE_BACKUP_DIRECTORY

export SYSTEMD_DIRECTORY
export SYSTEMD_SERVICE_FILE

export SUDOERS_DIRECTORY
export NMCLI_SUDOERS_FILE

export BLUETOOTH_CACHE_DIRECTORY

export PID_FILE
export LOCK_FILE
export STATUS_FILE

export CLEANUP_DIRECTORIES
export CLEANUP_FILES
export REQUIRED_DIRECTORIES