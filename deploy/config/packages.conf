#!/usr/bin/env bash
###############################################################################
#
# TinQa Deployment Framework
#
# File        : packages.conf
# Version     : 1.0.0
#
# Description :
# Centralized APT package definitions.
#
###############################################################################

set -Eeuo pipefail

###############################################################################
# Core Packages
###############################################################################

APT_CORE_PACKAGES=(

    python3
    python3-dev
    python3-venv

    build-essential
    pkg-config

    git
    curl
    wget
    rsync
    unzip

)

###############################################################################
# Bluetooth Packages
###############################################################################

APT_BLUETOOTH_PACKAGES=(

    bluez
    bluetooth

)

###############################################################################
# Network Packages
###############################################################################

APT_NETWORK_PACKAGES=(

    network-manager

)

###############################################################################
# DBus Packages
###############################################################################

APT_DBUS_PACKAGES=(

    libdbus-1-dev
    python3-dbus

)

###############################################################################
# GObject Packages
###############################################################################

APT_GOBJECT_PACKAGES=(

    libglib2.0-dev
    libgirepository1.0-dev

)

###############################################################################
# Scientific Libraries
###############################################################################

APT_NUMPY_PACKAGES=(

    libopenblas-dev

)

###############################################################################
# Complete Installation List
###############################################################################

APT_REQUIRED_PACKAGES=(

    "${APT_CORE_PACKAGES[@]}"

    "${APT_BLUETOOTH_PACKAGES[@]}"

    "${APT_NETWORK_PACKAGES[@]}"

    "${APT_DBUS_PACKAGES[@]}"

    "${APT_GOBJECT_PACKAGES[@]}"

    "${APT_NUMPY_PACKAGES[@]}"

)

###############################################################################
# Optional Packages
###############################################################################

APT_OPTIONAL_PACKAGES=(

)

###############################################################################
# Export
###############################################################################

export APT_CORE_PACKAGES
export APT_BLUETOOTH_PACKAGES
export APT_NETWORK_PACKAGES
export APT_DBUS_PACKAGES
export APT_GOBJECT_PACKAGES
export APT_NUMPY_PACKAGES
export APT_REQUIRED_PACKAGES
export APT_OPTIONAL_PACKAGES