#!/usr/bin/env bash
###############################################################################
#
# TinQa Deployment Framework
#
# File        : services.conf
# Version     : 1.0.0
#
# Description :
# Centralized service configuration.
#
###############################################################################

set -Eeuo pipefail

###############################################################################
# Service Names
###############################################################################

TINQA_SERVICE_NAME="tinqa"

TINQA_SERVICE_FILE="tinqa.service"

BLUETOOTH_SERVICE_NAME="bluetooth"

NETWORK_MANAGER_SERVICE_NAME="NetworkManager"

###############################################################################
# Systemd
###############################################################################

SYSTEMD_SERVICE_PATH="${SYSTEMD_DIRECTORY}/${TINQA_SERVICE_FILE}"

###############################################################################
# Deployment Order
###############################################################################

SERVICES_TO_STOP=(

    "${TINQA_SERVICE_NAME}"

)

SERVICES_TO_ENABLE=(

    "${BLUETOOTH_SERVICE_NAME}"

    "${NETWORK_MANAGER_SERVICE_NAME}"

    "${TINQA_SERVICE_NAME}"

)

SERVICES_TO_START=(

    "${BLUETOOTH_SERVICE_NAME}"

    "${NETWORK_MANAGER_SERVICE_NAME}"

    "${TINQA_SERVICE_NAME}"

)

###############################################################################
# Restart Policy
###############################################################################

SYSTEMD_RESTART_POLICY="always"

SYSTEMD_RESTART_DELAY=5

SYSTEMD_TIMEOUT_START=30

SYSTEMD_TIMEOUT_STOP=30

###############################################################################
# Dependencies
###############################################################################

SYSTEMD_AFTER=(

    network.target

    bluetooth.service

    NetworkManager.service

)

SYSTEMD_WANTED_BY="multi-user.target"

###############################################################################
# Health Check
###############################################################################

SERVICE_STARTUP_TIMEOUT=15

SERVICE_HEALTH_RETRIES=5

SERVICE_HEALTH_DELAY=2

###############################################################################
# Bluetooth
###############################################################################

BLUETOOTH_ADAPTER="hci0"

BLUETOOTH_CACHE_DIRECTORY="/var/lib/bluetooth"

###############################################################################
# Sudoers
###############################################################################

NMCLI_SUDOERS_FILE="/etc/sudoers.d/tinqa_nmcli"

NMCLI_SUDOERS_RULE="pi ALL=(ALL) NOPASSWD: /usr/bin/nmcli"

###############################################################################
# Export
###############################################################################

export TINQA_SERVICE_NAME
export TINQA_SERVICE_FILE

export BLUETOOTH_SERVICE_NAME
export NETWORK_MANAGER_SERVICE_NAME

export SYSTEMD_SERVICE_PATH

export SERVICES_TO_STOP
export SERVICES_TO_ENABLE
export SERVICES_TO_START

export SYSTEMD_RESTART_POLICY
export SYSTEMD_RESTART_DELAY

export SYSTEMD_TIMEOUT_START
export SYSTEMD_TIMEOUT_STOP

export SYSTEMD_AFTER
export SYSTEMD_WANTED_BY

export SERVICE_STARTUP_TIMEOUT
export SERVICE_HEALTH_RETRIES
export SERVICE_HEALTH_DELAY

export BLUETOOTH_ADAPTER
export BLUETOOTH_CACHE_DIRECTORY

export NMCLI_SUDOERS_FILE
export NMCLI_SUDOERS_RULE