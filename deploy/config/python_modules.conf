#!/usr/bin/env bash
###############################################################################
#
# TinQa Deployment Framework
#
# File        : python_modules.conf
# Version     : 1.0.0
#
# Description :
# Centralized Python package definitions.
#
###############################################################################

set -Eeuo pipefail

###############################################################################
# Python Environment
###############################################################################


VENV_NAME="venv"

###############################################################################
# Pip Upgrade Packages
###############################################################################

PIP_BOOTSTRAP_PACKAGES=(

    pip
    setuptools
    wheel

)

###############################################################################
# Application Packages
###############################################################################

PYTHON_APPLICATION_PACKAGES=(

    fastapi
    uvicorn

)

###############################################################################
# Hardware Packages
###############################################################################

PYTHON_HARDWARE_PACKAGES=(

    pyserial

    bleak

)

###############################################################################
# Bluetooth Packages
###############################################################################

PYTHON_BLUETOOTH_PACKAGES=(

    dbus-python

)

###############################################################################
# Scientific Packages
###############################################################################

PYTHON_SCIENTIFIC_PACKAGES=(

    numpy

)

###############################################################################
# Image Processing Packages
###############################################################################

PYTHON_IMAGE_PACKAGES=(

    Pillow

)

###############################################################################
# Utility Packages
###############################################################################

PYTHON_UTILITY_PACKAGES=(

    requests

)

###############################################################################
# Complete Package List
###############################################################################

PYTHON_REQUIRED_PACKAGES=(

    "${PYTHON_APPLICATION_PACKAGES[@]}"

    "${PYTHON_HARDWARE_PACKAGES[@]}"

    "${PYTHON_BLUETOOTH_PACKAGES[@]}"

    "${PYTHON_SCIENTIFIC_PACKAGES[@]}"

    "${PYTHON_IMAGE_PACKAGES[@]}"

    "${PYTHON_UTILITY_PACKAGES[@]}"

)

###############################################################################
# IMPORTANT
#
# These names are used only for:
#
# python -c "import <module>"
#
# They do NOT have to match the pip package names above.
###############################################################################

###############################################################################
# Python Packages
###############################################################################

PYTHON_REQUIRED_PACKAGES=(

    numpy
    requests
    bleak
    pyyaml
    opencv-python
    pyserial

)

###############################################################################
# Python Import Modules
###############################################################################

PYTHON_IMPORT_MODULES=(

    numpy
    requests
    bleak
    yaml
    cv2
    serial

)

###############################################################################
# Pip Options
###############################################################################

PIP_INSTALL_OPTIONS=(

    --upgrade

)

###############################################################################
# Export
###############################################################################

export VENV_NAME

export PIP_BOOTSTRAP_PACKAGES

export PYTHON_APPLICATION_PACKAGES
export PYTHON_HARDWARE_PACKAGES
export PYTHON_BLUETOOTH_PACKAGES
export PYTHON_SCIENTIFIC_PACKAGES
export PYTHON_IMAGE_PACKAGES
export PYTHON_UTILITY_PACKAGES

export PYTHON_REQUIRED_PACKAGES

export PIP_INSTALL_OPTIONS