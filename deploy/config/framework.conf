###############################################################################
#
# TinQa Deployment Framework
#
# File        : framework.conf
# Version     : 1.0.0
#
# Description :
# Global deployment framework configuration.
#
###############################################################################

###############################################################################
# Application Information
###############################################################################

export APPLICATION_NAME="TinQa"

export APPLICATION_VERSION="1.0.0"

export APPLICATION_DESCRIPTION="Bluetooth AI Assistant"

export  BANNER_VERSION="1.0.0"

###############################################################################
# Application Entry
###############################################################################

export APPLICATION_ENTRY_FILE="app/main.py"

export APPLICATION_ENTRY_MODULE="app.main"

export APPLICATION_PROCESS_NAME="app.main"

###############################################################################
# Deployment
###############################################################################

export DEPLOYMENT_MODE="production"

export ENABLE_ROLLBACK="true"

export ENABLE_DIAGNOSTICS="true"

export ENABLE_HEALTHCHECK="true"

###############################################################################
# Logging
###############################################################################

export LOG_TIMESTAMP="true"

export LOG_TO_FILE="true"

export LOG_TO_CONSOLE="true"

###############################################################################
# Runtime
###############################################################################

export SHELL="/usr/bin/env bash"

export SYSTEMD_REQUIRED="true"

###############################################################################
# Validation
###############################################################################

export STRICT_VALIDATION="true"

export EXIT_ON_ERROR="true"

###############################################################################
# Diagnostics
###############################################################################

export SAVE_SYSTEM_INFO="true"

export SAVE_SERVICE_LOGS="true"

export SAVE_DEPLOYMENT_REPORT="true"

###############################################################################
# Rollback
###############################################################################

export ROLLBACK_ON_FAILURE="true"

###############################################################################
# Colors
###############################################################################

export ENABLE_COLORS="true"

###############################################################################
# Progress
###############################################################################

export ENABLE_PROGRESS_BAR="true"

###############################################################################
# Banner
###############################################################################

export SHOW_BANNER="true"

###############################################################################
# End of File
###############################################################################